name: chart-testing

on:
  pull_request:
    paths:
      - charts/kompass/**
  push:
    branches:
      - main
    paths:
      - charts/kompass/**

jobs:
  ct:
    name: Chart Testing
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Detect umbrella chart changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            kompass:
              - charts/kompass/**

      - name: Checkout
        if: steps.changes.outputs.kompass == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        if: steps.changes.outputs.kompass == 'true'
        uses: azure/setup-helm@v4

      - name: Install helm-unittest plugin
        if: steps.changes.outputs.kompass == 'true'
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.0.3 --verify=false
          helm plugin list

      - name: Set up chart-testing
        if: steps.changes.outputs.kompass == 'true'
        uses: helm/chart-testing-action@v2.7.0

      - name: Lint changed charts
        if: steps.changes.outputs.kompass == 'true'
        run: ct lint --config .github/ct.yaml

      - name: Create kind cluster
        if: steps.changes.outputs.kompass == 'true'
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: chart-testing

      - name: Prepare smoke prerequisites
        if: steps.changes.outputs.kompass == 'true'
        run: |
          kubectl create namespace ct-smoke --dry-run=client -o yaml | kubectl apply -f -

          default_sc="$(kubectl get storageclass -o jsonpath='{range .items[?(@.metadata.annotations.storageclass\.kubernetes\.io/is-default-class=="true")]}{.metadata.name}{"\n"}{end}')"
          if [ -z "$default_sc" ]; then
          kubectl apply -f - <<'EOF'
          apiVersion: storage.k8s.io/v1
          kind: StorageClass
          metadata:
            name: ct-default
            annotations:
              storageclass.kubernetes.io/is-default-class: "true"
          provisioner: kubernetes.io/no-provisioner
          volumeBindingMode: WaitForFirstConsumer
          EOF
          fi

          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.19.1/cert-manager.crds.yaml
          kubectl wait --for=condition=Established --timeout=120s crd/clusterissuers.cert-manager.io
          kubectl wait --for=condition=Established --timeout=120s crd/certificates.cert-manager.io
          kubectl wait --for=condition=Established --timeout=120s crd/issuers.cert-manager.io

      - name: Install changed charts (API smoke)
        if: steps.changes.outputs.kompass == 'true'
        run: ct install --config .github/ct.yaml
