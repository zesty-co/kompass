{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kompass-pod-placement.fullname" . }}
  labels:
    {{- include "kompass-pod-placement.labels" . | nindent 4 }}
rules:
  # Pod operations. Patch and Update are required to update the pod's labels and annotations.
  - apiGroups:
    - ""
    resources:
    - pods
    verbs:
    - delete
    - get
    - list
    - patch
    - update
    - watch

  # Pod eviction
  - apiGroups:
    - ""
    resources:
    - pods/eviction
    verbs:
    - create

  # Node operations. Patch and Update are required to update the node's labels and annotations.
  - apiGroups:
    - ""
    resources:
    - nodes
    verbs: 
    - get
    - list
    - watch
    - patch
    - update

  # Events operations to record pod placement events
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch

  # Core operations.
  - apiGroups:
    - ""
    resources:
    - namespaces             # Required by scheduler
    - persistentvolumes      # Required by scheduler
    - persistentvolumeclaims # Required by scheduler
    - services               # Required by scheduler
    - replicationcontrollers # Required by scheduler
    verbs:
      - get
      - list
      - watch

  # Apps operations.
  - apiGroups:
      - "apps"
    resources:
      - replicasets  # Required by scheduler
      - statefulsets # Required by scheduler
    verbs:
      - get
      - list
      - watch

  # Workload operations. To get pod's workload.
  # Apps and Batch workload types
  - apiGroups:
      - "apps"
    resources:
      - deployments
      - daemonsets
      - replicasets
      - statefulsets
    verbs:
      - get
  - apiGroups:
      - "batch"
    resources:
      - jobs
      - cronjobs
    verbs:
      - get
  # Argo: Rollouts appear in ReplicaSet owner chains; Workflows/CronWorkflows own pods directly.
  - apiGroups:
      - "argoproj.io"
    resources:
      - rollouts
      - workflows
      - cronworkflows
    verbs:
      - get
  # Strimzi: StrimziPodSets own pods directly (replaces StatefulSets); Kafkas/KafkaConnects own StrimziPodSets.
  - apiGroups:
      - "core.strimzi.io"
    resources:
      - strimzipodsets
    verbs:
      - get
  - apiGroups:
      - "kafka.strimzi.io"
    resources:
      - kafkas
      - kafkaconnects
    verbs:
      - get
  # Prometheus Operator: manages StatefulSets/pods for Prometheus, Alertmanager, and Thanos.
  - apiGroups:
      - "monitoring.coreos.com"
    resources:
      - prometheuses
      - alertmanagers
      - thanosrulers
    verbs:
      - get
  # Flink Operator: FlinkDeployments and FlinkSessionJobs own Deployments/pods.
  - apiGroups:
      - "flink.apache.org"
    resources:
      - flinkdeployments
      - flinksessionjobs
    verbs:
      - get
  # GitHub Actions Runner Controller: EphemeralRunners and EphemeralRunnerSets own pods directly.
  - apiGroups:
      - "actions.github.com"
    resources:
      - ephemeralrunners
      - ephemeralrunnersets
    verbs:
      - get

  # PodDisruptionBudget operations. To read PDBs, identify unevictable pods and perform eviction.
  # Required for classification, eviction and by scheduler.
  - apiGroups:
    - "policy"
    resources:
    - poddisruptionbudgets
    verbs:
    - get
    - list
    - watch

  # Storage operations. To read CSI nodes, storage classes, and volume attachments.
  # Required by scheduler.
  - apiGroups:
      - "storage.k8s.io"
    resources:
      - csinodes
      - csidrivers
      - csistoragecapacities
      - storageclasses
      - volumeattachments
    verbs:
      - get
      - list
      - watch

  # Dynamic Resource Allocation (DRA) operations. To read resource claims, slices, and device classes.
  # Required by scheduler.
  - apiGroups:
      - "resource.k8s.io"
    resources:
      - resourceclaims
      - resourceslices
      - deviceclasses
    verbs:
      - get
      - list
      - watch

  # Karpenter v1alpha5 operations. To read Provisions.
  # Required for classification.
  - apiGroups:
      - "karpenter.sh"
    resources:
      - provisioners
    verbs:
      - get
      - list
      - watch

  # Karpenter v1 operations. To read NodePools.
  # Required for classification.
  - apiGroups:
    - "karpenter.sh"
    resources:
    - nodepools
    verbs:
    - get
    - list
    - watch

{{- end }}
