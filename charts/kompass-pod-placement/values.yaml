global:
  cxLogging:
    enabled: false
    clusterName: ""
    apiKey: ""
    apiKeySecret:
      name: kompass-cx-logging
      key: CX_API_KEY
    ingressUrl: https://ingress.eu2.coralogix.com/
    otelEndpoint: ""
  imagePullSecrets: []
  imagePullSecret:
    name: ""
    dockerconfigjson: ""

nameOverride: ~
fullnameOverride: ~

# kompassInsightSecret -- Name of the Kubernetes secret created by the Kompass Insight
kompassInsightSecret: "kompass-insights-secret"

image:
  registry: 672188301118.dkr.ecr.eu-west-1.amazonaws.com/zesty-k8s/pod-placement
  pullPolicy: Always
  tag: ~

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}

replicaCount: 2

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

service:
  portName: https
  port: 443
  targetPortName: https
  type: ClusterIP

ports:
  https:
    name: https
    containerPort: 9443
    protocol: TCP
  metrics:
    name: metrics
    containerPort: 8080
    protocol: TCP
  health:
    name: healthz
    containerPort: 8081
    protocol: TCP

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podLabels: {}

extraArgs: []
env: []
envFrom: []

extraVolumes: []
extraVolumeMounts: []

probes:
  readiness:
    httpGet:
      path: /readyz
      port: healthz
    initialDelaySeconds: 0
    periodSeconds: 10
  liveness:
    httpGet:
      path: /healthz
      port: healthz
    initialDelaySeconds: 0
    periodSeconds: 10

podDisruptionBudget:
  enabled: true
  minAvailable: 1
  maxUnavailable: ~

rbac:
  create: true

cxLogging:
  enabled: false
  clusterName: ""
  apiKey: ""
  apiKeySecret:
    name: kompass-cx-logging
    key: CX_API_KEY
  ingressUrl: https://ingress.eu2.coralogix.com/
  otelEndpoint: ""

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# cache.securityContext -- Security context for the Cache container.
# See: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true

# todo: use these values in deployment

webhook:
  enabled: true
  failurePolicy: Ignore
  timeoutSeconds: 5

evictionWindow:
  # Cron expression (5-field: minute hour day-of-month month day-of-week) that
  # defines when eviction windows open.
  # Leave empty (default) to allow evictions at any time.
  #
  # A single trigger per period is the common case:
  #   "0 22 * * 1-5"   →  one window opens Mon–Fri at 22:00
  #
  # Multiple triggers per period are also supported. The behaviour then depends
  # on duration relative to the interval between triggers:
  #   "*/15 22 * * 1-5" fires at 22:00, 22:15, 22:30, 22:45 on weekdays.
  #   - duration >= 15m  →  windows overlap, effectively one continuous window
  #   - duration <  15m  →  four separate short windows with gaps between them
  schedule: ""
  # How long each eviction window stays open after the schedule fires.
  # Required when schedule is non-empty.
  # Uses Go duration format (h, m, s are supported; days are not — use 24h instead).
  # Examples: "8h" (8 hours), "30m" (30 minutes), "1h30m" (1 hour 30 minutes)
  duration: ""
