suite: Credentials Secret envFrom
templates:
  - templates/deployment.yaml
  - templates/configMap.yaml
tests:
  - it: mounts created credentials secret
    set:
      encryptedCredentials: enc-123
      secret:
        create: true
        name: kompass-credentials
    asserts:
      - template: templates/deployment.yaml
        equal:
          path: spec.template.spec.containers[0].envFrom[1].secretRef.name
          value: kompass-credentials

  - it: mounts existing credentials secret
    set:
      secret:
        create: false
        name: existing-credentials
    asserts:
      - template: templates/deployment.yaml
        equal:
          path: spec.template.spec.containers[0].envFrom[1].secretRef.name
          value: existing-credentials
