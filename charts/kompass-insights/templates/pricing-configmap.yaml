{{- /*
  Per-cluster pricing rates rendered from .Values.pricing.config into the
  shape OpenCost expects for its CustomPricing struct, then mounted into
  the insights-agent pod at /var/configs/pricing/pricing.json.

  Created only when pricing.enabled=true. CPU and RAM are mandatory.
*/}}
{{- if .Values.pricing.enabled }}
{{- $_ := required "pricing.config.CPU is required when pricing.enabled=true" .Values.pricing.config.CPU }}
{{- $_ := required "pricing.config.RAM is required when pricing.enabled=true" .Values.pricing.config.RAM }}
{{- range $k, $v := .Values.pricing.config }}
  {{- if ne (kindOf $v) "string" }}
    {{- fail (printf "pricing.config.%s must be a quoted string (got %s: %v). Example: %s: \"%v\"" $k (kindOf $v) $v $k $v) }}
  {{- end }}
{{- end }}
{{- $config := deepCopy .Values.pricing.config }}
{{- $_ := set $config "provider" "custom" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Values.pricing.configMapName }}"
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/instance: "{{ include "zesty-k8s.fullname" . }}"
    app.kubernetes.io/name: "{{ include "zesty-k8s.fullname" . }}"
    app.kubernetes.io/component: pricing-config
data:
  pricing.json: |-
{{ toPrettyJson $config | indent 4 }}
{{- end }}
