{{- if or (and .Values.global.cxLogging .Values.global.cxLogging.enabled) (and .Values.cxLogging .Values.cxLogging.enabled) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "zesty-k8s.self-monitoring.fullname" . }}-clusterRole
  labels:
    app.kubernetes.io/instance: "{{ include "zesty-k8s.self-monitoring.fullname" . }}"
    app.kubernetes.io/name: "{{ include "zesty-k8s.fullname" . }}"
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - nodes
  - nodes/proxy
  - pods
  verbs:
  - get
  - list
- apiGroups:
  - apps
  resources:
  - deployments
  - statefulsets
  - daemonsets
  verbs:
  - get
- apiGroups:
  - argoproj.io
  resources:
  - rollouts
  verbs:
  - get
- apiGroups:
  - kompass.zesty.co
  resources:
  - workloaddescriptors
  verbs:
  - list
- apiGroups:
  - ""
  resources:
  - secrets
  resourceNames:
  - {{ .Values.insights.secret  }}
  verbs:
  - get
  - list
  - watch
{{- end }}
  
