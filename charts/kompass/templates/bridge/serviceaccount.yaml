{{- $bridgeValues := index .Values "kompass-bridge" | default (dict) -}}
{{- $sa := $bridgeValues.serviceAccount | default (dict) -}}
{{- if and $bridgeValues.enabled $sa.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kompass.bridge.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kompass.bridge.labels" . | nindent 4 }}
  {{- with $sa.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
