{{- $bridgeEnabled := index .Values.global "kompass-bridge" "enabled" | default false -}}
{{- $bridgeValues := index .Values "kompass-bridge" | default (dict) -}}
{{- $rbac := $bridgeValues.rbac | default (dict) -}}
{{- if and $bridgeEnabled $rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kompass.bridge.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kompass.bridge.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - patch
      - update
  - apiGroups: [""]
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
  {{- with $rbac.extraRules }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
