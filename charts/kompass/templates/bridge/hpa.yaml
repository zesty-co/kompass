{{- $bridgeValues := index .Values "kompass-bridge" | default (dict) -}}
{{- $autoscaling := $bridgeValues.autoscaling | default (dict) -}}
{{- if and $bridgeValues.enabled $autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "kompass.bridge.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kompass.bridge.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "kompass.bridge.fullname" . }}
  minReplicas: {{ $autoscaling.minReplicas | default 2 }}
  maxReplicas: {{ $autoscaling.maxReplicas | default 10 }}
  {{- $cpu := $autoscaling.targetCPUUtilizationPercentage }}
  {{- $memory := $autoscaling.targetMemoryUtilizationPercentage }}
  {{- if or $cpu $memory }}
  metrics:
    {{- if $cpu }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $cpu }}
    {{- end }}
    {{- if $memory }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $memory }}
    {{- end }}
  {{- end }}
  {{- with $autoscaling.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
