{{- if .Values.victoriaMetricsAgent.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: kompass-vmagent-config
  namespace: {{ .Release.Namespace }}
data:
  scrape.yml: |
    global:
      scrape_timeout: 29s
    scrape_configs:
      # For container CPU and memory metrics
      - job_name: 'kubelet'
        scrape_interval: {{ include "kompass.scrapeInterval" . }}
        scheme: https
        tls_config:
          insecure_skip_verify: true
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        authorization:
          credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
        metric_relabel_configs:
          - source_labels: [__name__]
            regex: '(container_memory_usage_bytes|container_memory_working_set_bytes|container_cpu_usage_seconds_total|container_cpu_cfs_throttled_seconds_total)'
            action: keep

      - job_name: 'kubelet-resource'
        scrape_interval: {{ include "kompass.scrapeInterval" . }}
        scheme: https
        tls_config:
          insecure_skip_verify: true
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        authorization:
          credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/resource
        metric_relabel_configs:
          - source_labels: [__name__]
            regex: (.+)
            target_label: __name__
            replacement: kubelet_resource_$1
          - source_labels: [__name__]
            regex: '(kubelet_resource_container_cpu_usage_seconds_total|kubelet_resource_container_memory_working_set_bytes|kubelet_resource_node_cpu_usage_seconds_total|kubelet_resource_node_memory_working_set_bytes)'
            action: keep

      - job_name: 'kubelet-volume'
        scrape_interval: {{ include "kompass.scrapeIntervalVolume" . }}
        scheme: https
        tls_config:
          insecure_skip_verify: true
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        authorization:
          credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics
        metric_relabel_configs:
          - source_labels: [__name__]
            regex: (kubelet_volume_stats_capacity_bytes|kubelet_volume_stats_used_bytes)
            action: keep
          - source_labels: [namespace]
            regex: "{{ .Release.Namespace }}"
            action: keep


      # for collecting Pilot metrics
      - job_name: 'pilot'
        scrape_interval: {{ include "kompass.scrapeInterval" . }}
        static_configs:
          - targets: ['http://{{- include "rightsizing.recommendationsMaker.name" . -}}.{{ .Release.Namespace }}:{{ .Values.rightsizing.recommendationsMaker.port }}']
        metric_relabel_configs:
          - source_labels: [__name__]
            regex: '(kompass_.*)'
            action: keep

      - job_name: 'rightsizing-savings'
        scrape_interval: {{ include "kompass.scrapeInterval" . }}
        static_configs:
          - targets: ['http://{{- include "rightsizing.recommendationsMaker.name" . -}}.{{ .Release.Namespace }}:{{ .Values.rightsizing.recommendationsMaker.port }}/savings']

      {{- $kompassInsights := (index .Values "kompass-insights" | default dict) }}
      {{- $kompassInsightsEnabled := ne (index $kompassInsights "enabled") false }}
      {{- $insightsConfig := (index $kompassInsights "insights" | default dict) }}
      {{- $insightsMetricsConfig := (index $insightsConfig "metrics" | default dict) }}
      {{- if and $kompassInsightsEnabled (hasKey $insightsConfig "service") (hasKey $insightsMetricsConfig "port") }}
      # for collecting insights metrics
      - job_name: 'kompass-insights'
        scrape_interval: {{ include "kompass.scrapeInterval" . }}
        static_configs:
          - targets: ['http://{{ $insightsConfig.service }}.{{ .Release.Namespace }}:{{ $insightsMetricsConfig.port }}']
        metric_relabel_configs:
          - source_labels: [__name__]
            regex: '(kompass_.*)'
            action: keep
      {{- end }}

      # Java metrics
      - job_name: 'java-runner-pods'
        scrape_interval: {{ include "kompass.scrapeInterval" . }}
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_java_runner]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:9404
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container

      # Java metrics normalized to unified JVM contract
      - job_name: 'java-runner-pods-unified'
        scrape_interval: {{ include "kompass.scrapeInterval" . }}
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_java_runner]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:9404
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
        metric_relabel_configs:
          - source_labels: [__name__, name]
            regex: '(java_lang_garbagecollector_collectiontime|java_lang_garbagecollector_collectioncount|java_lang_GarbageCollector_CollectionTime|java_lang_GarbageCollector_CollectionCount);(.+)'
            target_label: gc
            replacement: $2
          - source_labels: [__name__]
            regex: '(java_lang_garbagecollector_collectiontime|java_lang_GarbageCollector_CollectionTime)'
            target_label: __name__
            replacement: 'jvm_gc_collection_seconds_sum'
          - source_labels: [__name__]
            regex: '(java_lang_garbagecollector_collectioncount|java_lang_GarbageCollector_CollectionCount)'
            target_label: __name__
            replacement: 'jvm_gc_collection_seconds_count'
          - source_labels: [__name__, gc]
            regex: 'jvm_gc_collection_seconds_(sum|count);G1 Concurrent GC'
            action: drop
          - source_labels: [__name__, gc]
            regex: 'jvm_gc_collection_seconds_(sum|count);.+'
            target_label: gc_generation
            replacement: 'unknown'
          - source_labels: [__name__, gc]
            regex: 'jvm_gc_collection_seconds_(sum|count);(G1 Young Generation|Copy)'
            target_label: gc_generation
            replacement: 'young'
          - source_labels: [__name__, gc]
            regex: 'jvm_gc_collection_seconds_(sum|count);(G1 Old Generation|MarkSweepCompact)'
            target_label: gc_generation
            replacement: 'old'
          - source_labels: [__name__, gc]
            regex: 'jvm_gc_collection_seconds_(sum|count);.+'
            target_label: gc_collector_family
            replacement: 'unknown'
          - source_labels: [__name__, gc]
            regex: 'jvm_gc_collection_seconds_(sum|count);(G1 Young Generation|G1 Old Generation)'
            target_label: gc_collector_family
            replacement: 'g1'
          - source_labels: [__name__, gc]
            regex: 'jvm_gc_collection_seconds_(sum|count);(Copy|MarkSweepCompact)'
            target_label: gc_collector_family
            replacement: 'serial'

          - source_labels: [__name__]
            regex: '(java_lang_memory_heapmemoryusage_used|java_lang_Memory_HeapMemoryUsage_used)'
            target_label: __name__
            replacement: 'jvm_memory_bytes_used'
          - source_labels: [__name__]
            regex: '(java_lang_memory_heapmemoryusage_max|java_lang_Memory_HeapMemoryUsage_max)'
            target_label: __name__
            replacement: 'jvm_memory_bytes_max'
          - source_labels: [__name__]
            regex: '(jvm_memory_bytes_used|jvm_memory_bytes_max)'
            target_label: area
            replacement: 'heap'

          - source_labels: [__name__, name]
            regex: '(java_lang_memorypool_collectionusage_used|java_lang_memorypool_usage_max|java_lang_MemoryPool_CollectionUsage_used|java_lang_MemoryPool_Usage_max);(.+)'
            target_label: pool
            replacement: $2
          - source_labels: [__name__]
            regex: '(java_lang_memorypool_collectionusage_used|java_lang_MemoryPool_CollectionUsage_used)'
            target_label: __name__
            replacement: 'jvm_memory_pool_collection_used_bytes'
          - source_labels: [__name__]
            regex: '(java_lang_memorypool_usage_max|java_lang_MemoryPool_Usage_max)'
            target_label: __name__
            replacement: 'jvm_memory_pool_collection_max_bytes'
          - source_labels: [__name__, pool]
            regex: 'jvm_memory_pool_collection_(used|max)_bytes;.+'
            target_label: pool_generation
            replacement: 'unknown'
          - source_labels: [__name__, pool]
            regex: 'jvm_memory_pool_collection_(used|max)_bytes;(G1 Eden Space|Eden Space)'
            target_label: pool_generation
            replacement: 'eden'
          - source_labels: [__name__, pool]
            regex: 'jvm_memory_pool_collection_(used|max)_bytes;(G1 Survivor Space|Survivor Space)'
            target_label: pool_generation
            replacement: 'survivor'
          - source_labels: [__name__, pool]
            regex: 'jvm_memory_pool_collection_(used|max)_bytes;(G1 Old Gen|Tenured Gen)'
            target_label: pool_generation
            replacement: 'old'

          - source_labels: [__name__]
            regex: '(jvm_gc_collection_seconds_sum|jvm_gc_collection_seconds_count|jvm_memory_bytes_used|jvm_memory_bytes_max|jvm_memory_pool_collection_used_bytes|jvm_memory_pool_collection_max_bytes|process_cpu_seconds_total)'
            action: keep

      {{- if .Values.victoriaMetrics.enabled }}
      # for collecting VM metrics
      - job_name: 'vmetrics'
        scrape_interval: {{ include "kompass.scrapeInterval" . }}
        static_configs:
          - targets: ['{{ .Values.victoriaMetrics.server.fullnameOverride }}.{{ .Release.Namespace }}:8428']
      {{- end }}

      {{- if .Values.victoriaMetricsCluster.enabled }}
      - job_name: 'vmselect'
        scrape_interval: {{ include "kompass.scrapeInterval" . }}
        static_configs:
          - targets: ['http://{{ .Values.victoriaMetricsCluster.vmselect.fullnameOverride }}.{{ .Release.Namespace }}:8481']
      - job_name: 'vminsert'
        scrape_interval: {{ include "kompass.scrapeInterval" . }}
        static_configs:
          - targets: ['http://{{ .Values.victoriaMetricsCluster.vminsert.fullnameOverride }}.{{ .Release.Namespace }}:8480']
      - job_name: 'vmstorage'
        scrape_interval: {{ include "kompass.scrapeInterval" . }}
        static_configs:
          - targets: ['http://{{ .Values.victoriaMetricsCluster.vmstorage.fullnameOverride }}.{{ .Release.Namespace }}:8482']
      {{- end }}

      {{- if .Values.victoriaMetricsAuth.enabled }}
      # for collecting VM metrics
      - job_name: 'vmauth'
        scrape_interval: {{ include "kompass.scrapeInterval" . }}
        static_configs:
          - targets: ['{{ .Values.victoriaMetricsAuth.fullnameOverride }}.{{ .Release.Namespace }}:8427']
      {{- end }}

      {{- $recommendationsConfig := (index $kompassInsights "recommendations" | default dict) }}
      {{- $recommendationsHTTPConfig := (index $recommendationsConfig "http" | default dict) }}
      {{- if and $kompassInsightsEnabled (index $recommendationsConfig "enabled") (hasKey $recommendationsHTTPConfig "port") }}
      # for collecting recommendations
      - job_name: 'recommendations'
        scrape_interval: {{ include "kompass.scrapeInterval" . }}
        static_configs:
          - targets: ['http://{{ include "zesty-k8s.recommendations.fullname" (dict "Values" $kompassInsights "Release" .Release "Chart" (dict "Name" "kompass-insights")) }}.{{ .Release.Namespace }}:{{ $recommendationsHTTPConfig.port }}']
        metric_relabel_configs:
          - source_labels: [__name__]
            regex: '(workload_headroom_reduction_recommendation_min_replicas)'
            action: keep
      {{- end }}

      # For pod and node metrics
      - job_name: 'kube-state-metrics'
        scrape_interval: {{ include "kompass.scrapeIntervalKubeStateMetrics" . }}
        scrape_timeout: {{ include "kompass.scrapeTimeoutKubeStateMetrics" . }}
        kubernetes_sd_configs:
          - role: service
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            regex: {{ include "kompass.kube-state-metrics.serviceName" . }}
            action: keep
          {{- /* For backward compatibility, add namespace config, only if the namespace was provided */}}
          {{- if (include "kompass.kube-state-metrics.serviceNamespace" . ) }}
          - source_labels: [__meta_kubernetes_namespace]
            regex: {{ include "kompass.kube-state-metrics.serviceNamespace" . }}
            action: keep
          {{- end }}
        metric_relabel_configs:
          - source_labels: [__name__]
            regex: '{{ include "kompass.kube-state-metrics.keepRegex" . }}'
            action: keep

      {{- if index .Values "kompass-pod-placement" "enabled" }}
      # for collecting pod-placement metrics
      - job_name: 'pod-placement'
        scrape_interval: {{ include "kompass.scrapeInterval" . }}
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - {{ .Release.Namespace }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            regex: {{ include "kompass.pod-placement.name" . }}
            action: keep
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_instance]
            regex: {{ .Release.Name }}
            action: keep
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            regex: metrics
            action: keep
        metric_relabel_configs:
          - source_labels: [__name__]
            regex: '(kompass_pod_placement_pod_info)'
            action: keep
      {{- end }}

      # for collecting action-taker metrics
      - job_name: 'action-taker'
        scrape_interval: {{ include "kompass.scrapeInterval" . }}
        scheme: https
        tls_config:
          insecure_skip_verify: true
        authorization:
          credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - {{ .Release.Namespace }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_control_plane]
            regex: controller-manager
            action: keep
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            regex: pod-rightsizing
            action: keep
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            regex: https
            action: keep
        metric_relabel_configs:
          - source_labels: [__name__]
            regex: '(actiontaker_.*)'
            action: keep


      #  vmagent's own metrics
      - job_name: 'vmagent'
        scrape_interval: {{ include "kompass.scrapeInterval" . }}
        static_configs:
          - targets:
              - 'localhost:8429'
      
      # vmalert metrics
      - job_name: 'vmalert'
        scrape_interval: {{ include "kompass.scrapeInterval" . }}
        static_configs:
          - targets: ['http://{{ printf "%s-server" .Values.victoriaMetricsAlert.fullnameOverride }}.{{ .Release.Namespace }}:{{ .Values.victoriaMetricsAlert.server.service.servicePort | default 8880 }}']
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kompass-vm-custom-recording-rules
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kompass.labels" . | nindent 4 }}
data:
  custom-rules.yaml: |
{{ tpl (.Files.Get "files/custom-vm-recording-rules.yaml") . | indent 4 }}
{{- end -}}
