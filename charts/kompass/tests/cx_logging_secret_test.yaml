suite: CX logging API key secret references
templates:
  - templates/cx-logging-secret.yaml

tests:
  - it: renders secret resource when plaintext api key is set
    set:
      global:
        kompass-bridge:
          enabled: true
        cxLogging:
          enabled: true
          apiKey: cx-api-key
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: kompass-cx-logging
      - equal:
          path: stringData.CX_API_KEY
          value: cx-api-key

  - it: does not render secret resource when api key is empty
    set:
      global:
        kompass-bridge:
          enabled: false
        cxLogging:
          enabled: true
          apiKey: ""
    asserts:
      - hasDocuments:
          count: 0
