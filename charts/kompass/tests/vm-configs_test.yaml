suite: VM config insights scrape jobs
templates:
  - templates/dependencies/vm-configs.yaml

tests:
  - it: does not render insights or recommendations scrape jobs when kompass-insights is disabled
    documentSelector:
      path: metadata.name
      value: kompass-vmagent-config
    set:
      kompass-insights:
        enabled: false
        insights:
          service: kompass-insights
          metrics:
            port: 8080
        recommendations:
          enabled: true
          http:
            port: 9090
    asserts:
      - notMatchRegex:
          path: data["scrape.yml"]
          pattern: "job_name: 'kompass-insights'"
      - notMatchRegex:
          path: data["scrape.yml"]
          pattern: "job_name: 'recommendations'"

  - it: renders insights scrape job when kompass-insights is enabled
    documentSelector:
      path: metadata.name
      value: kompass-vmagent-config
    set:
      kompass-insights:
        enabled: true
        insights:
          service: kompass-insights
          metrics:
            port: 8080
    asserts:
      - matchRegex:
          path: data["scrape.yml"]
          pattern: "job_name: 'kompass-insights'"

  - it: uses external kube-state-metrics service and namespace when installation is disabled
    documentSelector:
      path: metadata.name
      value: kompass-vmagent-config
    set:
      kubeStateMetrics:
        enabled: false
        serviceName: external-ksm
        serviceNamespace: observability
    asserts:
      - matchRegex:
          path: data["scrape.yml"]
          pattern: "job_name: 'kube-state-metrics-actions'"
      - matchRegex:
          path: data["scrape.yml"]
          pattern: "job_name: 'kube-state-metrics-actions'[\\s\\S]*params:[\\s\\S]*resources:[\\s\\S]*- \"actions\""
      - matchRegex:
          path: data["scrape.yml"]
          pattern: 'source_labels: \[__meta_kubernetes_service_name\][\s\S]*regex: external-ksm'
      - matchRegex:
          path: data["scrape.yml"]
          pattern: 'source_labels: \[__meta_kubernetes_namespace\][\s\S]*regex: observability'

  - it: renders per-resource kube-state-metrics scrape jobs by default
    documentSelector:
      path: metadata.name
      value: kompass-vmagent-config
    asserts:
      - matchRegex:
          path: data["scrape.yml"]
          pattern: "job_name: 'kube-state-metrics-actions'[\\s\\S]*params:[\\s\\S]*resources:[\\s\\S]*- \"actions\""
      - matchRegex:
          path: data["scrape.yml"]
          pattern: "job_name: 'kube-state-metrics-pods'[\\s\\S]*params:[\\s\\S]*resources:[\\s\\S]*- \"pods\""
      - matchRegex:
          path: data["scrape.yml"]
          pattern: "job_name: 'kube-state-metrics-cronjobs'[\\s\\S]*params:[\\s\\S]*resources:[\\s\\S]*- \"cronjobs\""
      - matchRegex:
          path: data["scrape.yml"]
          pattern: "job_name: 'kube-state-metrics-horizontalpodautoscalers'"
      - matchRegex:
          path: data["scrape.yml"]
          pattern: "job_name: 'kube-state-metrics-deployments'[\\s\\S]*regex: '\\(kube_deployment_metadata_generation\\)'"
      - notMatchRegex:
          path: data["scrape.yml"]
          pattern: "job_name: 'kube-state-metrics'\n"

  - it: renders dedicated kube-state-metrics scrape interval and derived timeout
    documentSelector:
      path: metadata.name
      value: kompass-vmagent-config
    set:
      kubeStateMetrics:
        kompassScrapeInterval: 45s
    asserts:
      - matchRegex:
          path: data["scrape.yml"]
          pattern: "job_name: 'kube-state-metrics-actions'[\\s\\S]*scrape_interval: 45s[\\s\\S]*scrape_timeout: 44s"

  - it: renders legacy single kube-state-metrics scrape job when configured
    documentSelector:
      path: metadata.name
      value: kompass-vmagent-config
    set:
      kubeStateMetrics:
        scrape:
          mode: single
    asserts:
      - matchRegex:
          path: data["scrape.yml"]
          pattern: "job_name: 'kube-state-metrics'\n"
      - notMatchRegex:
          path: data["scrape.yml"]
          pattern: "params:[\\s\\S]*resources:"
      - notMatchRegex:
          path: data["scrape.yml"]
          pattern: "job_name: 'kube-state-metrics-actions'"

  - it: renders only configured kube-state-metrics resources in per-resource mode
    documentSelector:
      path: metadata.name
      value: kompass-vmagent-config
    set:
      kubeStateMetrics:
        scrape:
          resources:
            - pods
            - nodes
    asserts:
      - matchRegex:
          path: data["scrape.yml"]
          pattern: "job_name: 'kube-state-metrics-pods'[\\s\\S]*params:[\\s\\S]*resources:[\\s\\S]*- \"pods\""
      - matchRegex:
          path: data["scrape.yml"]
          pattern: "job_name: 'kube-state-metrics-nodes'[\\s\\S]*params:[\\s\\S]*resources:[\\s\\S]*- \"nodes\""
      - notMatchRegex:
          path: data["scrape.yml"]
          pattern: "job_name: 'kube-state-metrics-actions'"

  - it: builds kube-state-metrics keep regex from top-level metricsScrapeFilters values
    documentSelector:
      path: metadata.name
      value: kompass-vmagent-config
    set:
      kubeStateMetrics:
        scrape:
          mode: single
      metricsScrapeFilters:
        kubeStateMetrics:
          exact:
            - kube_pod_info
            - kube_job_owner
          prefixes:
            - kompass_rs_
    asserts:
      - matchRegex:
          path: data["scrape.yml"]
          pattern: "regex: '\\(kube_pod_info\\|kube_job_owner\\|kompass_rs_\\.\\*\\)'"
      - notMatchRegex:
          path: data["scrape.yml"]
          pattern: "kube_namespace_status_phase"
