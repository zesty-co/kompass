suite: kube-state-metrics validator values
templates:
  - templates/pre-install-hooks/kompass-validator.yaml

tests:
  - it: passes external kube-state-metrics per-resource settings to the validator
    documentSelector:
      path: metadata.name
      value: kompass-validation
    set:
      kubeStateMetrics:
        enabled: false
        serviceName: external-ksm
        scrape:
          mode: perResource
    asserts:
      - contains:
          path: spec.template.spec.containers[?(@.name == "kompass-validator")].env
          content:
            name: KSM_ENABLED
            value: "false"
      - contains:
          path: spec.template.spec.containers[?(@.name == "kompass-validator")].env
          content:
            name: KSM_SVC_NAME
            value: external-ksm
      - contains:
          path: spec.template.spec.containers[?(@.name == "kompass-validator")].env
          content:
            name: KSM_SCRAPE_MODE
            value: perResource

  - it: passes managed kube-state-metrics settings to the validator
    documentSelector:
      path: metadata.name
      value: kompass-validation
    set:
      kubeStateMetrics:
        enabled: true
        scrape:
          mode: perResource
    asserts:
      - contains:
          path: spec.template.spec.containers[?(@.name == "kompass-validator")].env
          content:
            name: KSM_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[?(@.name == "kompass-validator")].env
          content:
            name: KSM_SCRAPE_MODE
            value: perResource
