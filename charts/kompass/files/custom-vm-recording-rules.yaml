{{- $methods := default (dict) .Values.rightsizing.config.customReplicaAggregationMethods -}}
{{- $cpuMethods := default (dict) (get $methods "cpu") -}}
{{- $memoryMethods := default (dict) (get $methods "memory") -}}
groups:
  - name: custom_rules
    concurrency: 4
    rules:
      - record: kompass_container_cpu_usage_max_rate
        expr: max by (container, resource_id, created_by_name, created_by_kind, namespace) ((rate(container_cpu_usage_seconds_total{container!="",pod!=""}[1m]) * on (namespace,pod,container) group_left (resource_id,created_by_name,created_by_kind) max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_pod_info)) or (0 * max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_pod_info)))
      - record: kompass_container_cpu_usage_p95_rate
        expr: quantile by (container, resource_id, created_by_name, created_by_kind, namespace) (0.95, (rate(container_cpu_usage_seconds_total{container!="",pod!=""}[1m]) * on (namespace,pod,container) group_left (resource_id,created_by_name,created_by_kind) max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_pod_info)) or (0 * max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_pod_info)))
      - record: kompass_container_cpu_usage_p85_rate
        expr: quantile by (container, resource_id, created_by_name, created_by_kind, namespace) (0.85, (rate(container_cpu_usage_seconds_total{container!="",pod!=""}[1m]) * on (namespace,pod,container) group_left (resource_id,created_by_name,created_by_kind) max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_pod_info)) or (0 * max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_pod_info)))
{{- if hasKey $cpuMethods "custom1" }}
      - record: kompass_container_cpu_usage_custom1_rate
        expr: quantile by (container, resource_id, created_by_name, created_by_kind, namespace) ({{ divf (float64 (get $cpuMethods "custom1")) 100 }}, (rate(container_cpu_usage_seconds_total{container!="",pod!=""}[1m]) * on (namespace,pod,container) group_left (resource_id,created_by_name,created_by_kind) max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_pod_info)) or (0 * max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_pod_info)))
{{- end }}
{{- if hasKey $cpuMethods "custom2" }}
      - record: kompass_container_cpu_usage_custom2_rate
        expr: quantile by (container, resource_id, created_by_name, created_by_kind, namespace) ({{ divf (float64 (get $cpuMethods "custom2")) 100 }}, (rate(container_cpu_usage_seconds_total{container!="",pod!=""}[1m]) * on (namespace,pod,container) group_left (resource_id,created_by_name,created_by_kind) max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_pod_info)) or (0 * max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_pod_info)))
{{- end }}
      - record: kompass_container_memory_usage_max
        expr: max by (container, resource_id, created_by_name, created_by_kind, namespace) ((container_memory_working_set_bytes{container!="",pod!=""} * on (namespace,pod,container) group_left (resource_id,created_by_name,created_by_kind) max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_pod_info)) or (0 * max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_pod_info)))
      - record: kompass_container_memory_usage_p95
        expr: quantile by (container, resource_id, created_by_name, created_by_kind, namespace) (0.95, (container_memory_working_set_bytes{container!="",pod!=""} * on (namespace,pod,container) group_left (resource_id,created_by_name,created_by_kind) max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_pod_info)) or (0 * max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_pod_info)))
      - record: kompass_container_memory_usage_p99
        expr: quantile by (container, resource_id, created_by_name, created_by_kind, namespace) (0.99, (container_memory_working_set_bytes{container!="",pod!=""} * on (namespace,pod,container) group_left (resource_id,created_by_name,created_by_kind) max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_pod_info)) or (0 * max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_pod_info)))
{{- if hasKey $memoryMethods "custom1" }}
      - record: kompass_container_memory_usage_custom1
        expr: quantile by (container, resource_id, created_by_name, created_by_kind, namespace) ({{ divf (float64 (get $memoryMethods "custom1")) 100 }}, (container_memory_working_set_bytes{container!="",pod!=""} * on (namespace,pod,container) group_left (resource_id,created_by_name,created_by_kind) max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_pod_info)) or (0 * max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_pod_info)))
{{- end }}
{{- if hasKey $memoryMethods "custom2" }}
      - record: kompass_container_memory_usage_custom2
        expr: quantile by (container, resource_id, created_by_name, created_by_kind, namespace) ({{ divf (float64 (get $memoryMethods "custom2")) 100 }}, (container_memory_working_set_bytes{container!="",pod!=""} * on (namespace,pod,container) group_left (resource_id,created_by_name,created_by_kind) max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_pod_info)) or (0 * max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_pod_info)))
{{- end }}
      - record: kompass_container_cpu_usage_sum_rate
        expr: sum by (container, resource_id, created_by_name, created_by_kind, namespace) ((rate(container_cpu_usage_seconds_total{container!="",pod!=""}[1m]) * on (namespace,pod,container) group_left (resource_id,created_by_name,created_by_kind) max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_insights_pod_info)) or (0 * max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_insights_pod_info)))
      - record: kompass_container_resource_requests_median
        expr: quantile by (container, resource_id, created_by_name, created_by_kind, namespace, resource) (0.5, (kube_pod_container_resource_requests * on (namespace,pod,container) group_left (resource_id,created_by_name,created_by_kind) max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_insights_pod_info)) or (0 * max by (namespace,pod,container,resource_id,created_by_name,created_by_kind,resource) (kube_pod_container_resource_requests * on (namespace,pod,container) group_left (resource_id,created_by_name,created_by_kind) max by (namespace,pod,container,resource_id,created_by_name,created_by_kind) (kompass_insights_pod_info))))
      - record: kompass_hpa_workload_cpu_usage_rate
        expr: sum(rate(container_cpu_usage_seconds_total{container!="",pod!=""}[1m]) * on(pod,container) group_left (resource_id,created_by_name,created_by_kind,namespace) max (kompass_pod_info) by (container,pod,resource_id,created_by_name,created_by_kind,namespace) * on (namespace, created_by_name) group_left (scaletargetref_kind, horizontalpodautoscaler) label_replace(label_replace(max by (namespace, scaletargetref_name, scaletargetref_kind, horizontalpodautoscaler) (label_lowercase(kube_horizontalpodautoscaler_info, "scaletargetref_kind")), "created_by_kind", "$1", "scaletargetref_kind", "(.*)"), "created_by_name", "$1", "scaletargetref_name", "(.*)")) by (resource_id, created_by_kind, created_by_name, namespace)
      - record: kompass_hpa_workload_memory_usage_rate
        expr: sum(container_memory_working_set_bytes{container!="",pod!=""}[1m] * on(pod,container) group_left (resource_id,created_by_name,created_by_kind,namespace) max (kompass_pod_info) by (container,pod,resource_id,created_by_name,created_by_kind,namespace) * on (namespace, created_by_name) group_left (scaletargetref_kind, horizontalpodautoscaler) label_replace(label_replace(max by (namespace, scaletargetref_name, scaletargetref_kind, horizontalpodautoscaler) (label_lowercase(kube_horizontalpodautoscaler_info, "scaletargetref_kind")), "created_by_kind", "$1", "scaletargetref_kind", "(.*)"), "created_by_name", "$1", "scaletargetref_name", "(.*)")) by (resource_id, created_by_kind, created_by_name, namespace)
      - record: kompass_pod_startup_time
        expr: (kube_pod_status_ready_time - kube_pod_created) * on (pod, namespace) group_left (created_by_name, created_by_kind, resource_id) max by (pod, namespace, created_by_name, created_by_kind, resource_id) (kompass_pod_info)
      - record: kompass_rs_initial_minus_desired
        expr: max by (resource_id, pod, resource_type) (kompass_pod_info{status="running"} * on(resource_id, pod) group_left(resource_type) max by (resource_id, pod, resource_type) (last_over_time(kompass_rs_initial_minus_desired{pod!=""}[1h])))
      - record: kompass_pod_container_resource_requests
        expr: avg(kube_pod_container_resource_requests{container!="",pod!=""} * on (namespace, pod, container) group_left (resource_id, created_by_name, created_by_kind) max(kompass_pod_info) by (container, pod, resource_id, created_by_name, created_by_kind, namespace)) by (container, resource, resource_id, created_by_name, created_by_kind, namespace)
      - record: kompass_pod_container_resource_limits
        expr: avg(kube_pod_container_resource_limits{container!="",pod!=""} * on (namespace, pod, container) group_left (resource_id, created_by_name, created_by_kind) max(kompass_pod_info) by (container, pod, resource_id, created_by_name, created_by_kind, namespace)) by (container, resource, resource_id, created_by_name, created_by_kind, namespace)

      # NOTE: {status="running"} on the right-hand side of each group_left join below MUST NOT be removed.
      # kompass_insights_pod_info can have multiple entries per (container, pod, namespace) with different
      # status values (e.g. "running" and "terminated"). group_left requires at most one right-side match
      # per join key, so removing this filter causes a "multiple matches for labels" error at query time.
      - record: kompass_container_resource_requests
        expr: >-
          kube_pod_container_resource_requests
          * on(container,pod,namespace) group_left(created_by_name,created_by_kind,capacity_type,resource_id,status)
          max by(container,pod,namespace,created_by_name,created_by_kind,capacity_type,resource_id,status) (
            kompass_insights_pod_info{status="running"}
          )
      - record: kompass_container_cpu_usage_avg
        expr: >-
          avg by(container,pod,created_by_name,created_by_kind,capacity_type,namespace,resource_id,status) (
            rate(kubelet_resource_container_cpu_usage_seconds_total[1m])
              * on(container,pod,namespace) group_left(created_by_kind,created_by_name,capacity_type,resource_id,status)
            max by(container,pod,created_by_name,created_by_kind,capacity_type,namespace,resource_id,status) (
              kompass_insights_pod_info{status="running"}
            )
          )
      - record: kompass_container_memory_usage_avg
        expr: >-
          avg by(container,pod,created_by_name,created_by_kind,capacity_type,namespace,resource_id,status) (
            kubelet_resource_container_memory_working_set_bytes
              * on(container,pod,namespace) group_left(created_by_name,created_by_kind,capacity_type,resource_id,status)
            max by(container,pod,created_by_name,created_by_kind,capacity_type,namespace,resource_id,status) (
              kompass_insights_pod_info{status="running"}
            )
          )
      - record: kompass_container_resource_limits
        expr: >-
          label_replace(
            label_replace(
              kube_pod_container_resource_limits,
              "resource", "cpu_limit", "resource", "^cpu$"
            ),
            "resource", "memory_limit", "resource", "^memory$"
          )
          * on(container,pod,namespace) group_left(created_by_name,created_by_kind,capacity_type,resource_id,status)
          max by(container,pod,namespace,created_by_name,created_by_kind,capacity_type,resource_id,status) (
            kompass_insights_pod_info{status="running"}
          )
      - record: kompass_container_restarts
        expr: >-
          kube_pod_container_status_restarts_total
            * on(container,pod,namespace) group_left(created_by_name,created_by_kind,capacity_type,resource_id,status)
          max by(container,pod,namespace,created_by_name,created_by_kind,capacity_type,resource_id,status) (
            kompass_insights_pod_info{status="running"}
          )
      {{- if index .Values "kompass-pod-placement" "enabled" }}
      # kompass_pod_placement_pod_info is returned by all pod-placement pods
      # `max without()` is used to deduplicate metrics from multiple instances/pods
      - record: kompass_pod_placement_pod_info_extended
        expr: >-
          max without(instance,job) (kompass_pod_placement_pod_info)
            * on(pod,namespace) group_left(created_by_name,created_by_kind,capacity_type,resource_id,status)
          max by(pod,namespace,created_by_name,created_by_kind,capacity_type,resource_id,status) (
            kompass_insights_pod_info{status="running"}
          )
      {{- end }}
